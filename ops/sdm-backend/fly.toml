# Haven SDM verifier — deploy with scripts/deploy-sdm-backend.sh
# Image: icedevml/sdm-backend (NTAG 424 DNA, legacy key derivation)

app = "haven-sdm-backend"
primary_region = "sin"

[build]
  image = "icedevml/sdm-backend:latest"

[env]
  PORT = "80"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
