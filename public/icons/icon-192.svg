<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c221f" />
      <stop offset="100%" stop-color="#120f0e" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c29e" />
      <stop offset="100%" stop-color="#d9a67a" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="192" height="192" rx="42" fill="url(#bg)" />
  <circle cx="96" cy="96" r="50" fill="none" stroke="url(#ring)" stroke-width="16" filter="url(#glow)" />
  <circle cx="96" cy="96" r="28" fill="#1a1513" opacity="0.85" />
</svg>
